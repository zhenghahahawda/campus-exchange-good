server:
  port: 8081

spring:
  application:
    name: houdaun-backend
  datasource:
    url: jdbc:mysql://YOUR_DB_HOST:3306/exchange_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# Tencent Cloud COS Configuration
tencent:
  cos:
    secret-id: YOUR_COS_SECRET_ID
    secret-key: YOUR_COS_SECRET_KEY
    region: ap-guangzhou
    bucket-name: YOUR_BUCKET_NAME

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.example: DEBUG
    com.baomidou.mybatisplus: DEBUG

jwt:
  secret: YOUR_JWT_SECRET_KEY_HERE_AT_LEAST_256_BITS
  expiration: 604800 # 7 days
